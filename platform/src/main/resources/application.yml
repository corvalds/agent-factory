spring:
  application:
    name: agent-factory-platform
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agentfactory}
    username: ${DB_USER:agentfactory}
    password: ${DB_PASSWORD:agentfactory}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

af:
  api-key: ${AF_API_KEY:dev-api-key-change-me}
  encryption-key: ${AF_ENCRYPTION_KEY:01234567890123456789012345678901}
  agent-service-url: ${AGENT_SERVICE_URL:http://localhost:8000}
  sandbox:
    docker-host: ${DOCKER_HOST:unix:///var/run/docker.sock}
    cpu-limit: ${SANDBOX_CPU:1}
    memory-limit-mb: ${SANDBOX_MEMORY:512}
    timeout-seconds: ${SANDBOX_TIMEOUT:300}
  pricing:
    gpt-4o: "0.0000025"
    gpt-4o-mini: "0.00000015"
    claude-sonnet-4: "0.000003"
    claude-opus-4: "0.000015"
    deepseek-v3: "0.00000027"
