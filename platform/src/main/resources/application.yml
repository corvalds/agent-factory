spring:
  application:
    name: agent-factory-platform
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agentfactory}
    username: ${DB_USER:agentfactory}
    password: ${DB_PASSWORD:agentfactory}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

af:
  api-key: ${AF_API_KEY:dev-api-key-change-me}
  encryption-key: ${AF_ENCRYPTION_KEY:01234567890123456789012345678901}
  agent-service-url: ${AGENT_SERVICE_URL:http://localhost:8000}
